format:
  html:
    toc: true
    toc-expand: 2
    toc-depth: 5
    theme:
      light: brand
      dark: darkly
    css: styles.css
    code-line-numbers: true
    html-math-method: katex
    number-sections: true
    number-depth: 3

editor:
  markdown:
    wrap: 100

exceute:
  freeze: auto