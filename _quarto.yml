project:
  type: book
  output-dir: docs

csl: springer-lecture-notes-in-computer-science.csl

book:
  title: "Computer Science Notebook"
  author: "Lukas Mensch"
  date: "2026-04-06"
  cover-image: images/notebook-50percent.png
  cover-image-alt: |
    An inviting workspace featuring a laptop displaying code, a steaming ceramic mug, a physical
    notebook, and a small potted plant under soft, diffused light.
  favicon: images/coffee-icon-64.png
  reader-mode: true
  repo-url: https://github.com/Lukullul/Computer-Science-Notebook
  page-footer:
    center: 
      - href: LICENSE.qmd
  sidebar: 
    collapse-level: 1
    tools: 
      - icon: house
        href: https://lukullul.github.io
  chapters:
    - index.qmd
    - part: Linux
      chapters: 
      - qmd/linux-lpic-cheat-sheet.qmd

